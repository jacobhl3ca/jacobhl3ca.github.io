<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tint the mobile browser chrome (address bar / status bar) white for the brief redirect paint. This entry page forces light mode and hands off to the light homepage, whose light-theme chrome is #ffffff (index.html's inline head script and main.js set theme-color to #ffffff in light mode) — so match it here rather than let the OS default (often dark) flash. Completes the site-wide theme-color pattern already on index.html, 404.html, and weather/index.html. No visual change to page content. -->
    <meta name="theme-color" content="#ffffff">
    <!-- Declare the colour scheme to the UA up front. This entry page forces light mode (it sets theme=light below, then redirects), so "light" is correct — it stops OS-dark browsers painting the root canvas/scrollbars dark for the brief redirect paint. Mirrors the color-scheme declarations on index.html, 404.html, and weather/index.html; completes the site-wide pattern. No visual change. -->
    <meta name="color-scheme" content="light">
    <!-- Root-absolute favicon so this /light/ entry page shows the site icon instead of firing a 404 for the default /favicon.ico while it's briefly displayed. Mirrors the icon links on index.html, 404.html, and weather/index.html; completes the site-wide pattern. No visual change. -->
    <link rel="icon" type="image/x-icon" href="/assets/img/favicon.ico">
    <!-- No-JS fallback: redirect to the main site even when scripting is disabled (the script below handles the JS path) -->
    <meta http-equiv="refresh" content="0; url=/">
    <!-- Match the homepage's title element and this page's own og:title/twitter:title (all "Jacob Heifetz-Licht — Analytics Manager"): the plain page title was the one metadata field here still lagging with just the bare name, so a returning-in-light-mode visitor's browser tab/bookmark briefly read differently than the homepage's. A prior run aligned this page's description; this completes the light-page/homepage title consistency. No visual change to page content. -->
    <title>Jacob Heifetz-Licht — Analytics Manager</title>
    <!-- Match the homepage's current messaging: index.html was repositioned to lead with web development (React/Next.js) alongside analytics, but this light-mode entry page kept the older analytics-only description. og:title/twitter:title here already mirror index.html; align the description too so a shared /light/ link (whose OG tags are read by non-JS social scrapers before the JS redirect fires) reflects the current positioning. No visual change. -->
    <meta name="description" content="Data analytics leader and web developer specializing in Python, SQL, Tableau, React, and Next.js. Turning data into things people actually use.">
    <!-- Keep the keyword list in sync with index.html: the homepage was repositioned to lead with web development (React/Next.js) alongside analytics, and this page's title/description/og tags were already aligned to that — the keywords meta was the one field here still carrying the older analytics-only list. Completes the light-page/homepage metadata consistency. No visual change. -->
    <meta name="keywords" content="analytics manager, data analytics, Python, SQL, Tableau, automation, dashboard design, data visualization, ETL, BigQuery, JavaScript, React, Node.js, Next.js, web development">
    <meta name="author" content="Jacob Heifetz-Licht">
    <meta name="robots" content="noindex, follow">
    <meta property="og:title" content="Jacob Heifetz-Licht — Analytics Manager">
    <meta property="og:description" content="Data analytics leader and web developer specializing in Python, SQL, Tableau, React, and Next.js. Turning data into things people actually use.">
    <!-- Share image → og_image.png, matching the homepage this /light/ stub represents. This page is a noindex entry point that canonicalizes to / and mirrors the homepage's title/description/keywords, but its og:image (and the twitter:image below) were the one field still pointing at the older og_image_centered.png — the whole rest of the site (index.html, index_with_animation.html, weather/, building.html, and the other homepage variants — 13 references) uses og_image.png. So a shared /light/ link previewed with a different image than the homepage it stands in for. Both files already exist; this only changes which existing image is referenced (no media asset added/modified). Completes the light-page/homepage metadata alignment prior runs made for title, description, and keywords. No visual change to page content. -->
    <meta property="og:image" content="https://jacobhl.com/assets/img/og_image.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Jacob Heifetz-Licht — Analytics Manager and web developer">
    <meta property="og:url" content="https://jacobhl.com/light/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Jacob Heifetz-Licht">
    <meta property="og:locale" content="en_US">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Jacob Heifetz-Licht — Analytics Manager">
    <meta name="twitter:description" content="Data analytics leader and web developer specializing in Python, SQL, Tableau, React, and Next.js. Turning data into things people actually use.">
    <meta name="twitter:image" content="https://jacobhl.com/assets/img/og_image.png">
    <meta name="twitter:image:alt" content="Jacob Heifetz-Licht — Analytics Manager and web developer">
    <!-- Canonical → the homepage. This /light/ page is a noindex entry point whose only job is to force light mode and then redirect to / (see the meta refresh above and the script below), so its content is effectively the homepage's. Point the canonical at / to consolidate any signals for the /light/ URL onto the real page — mirroring the rel=canonical the site's other noindex homepage variant (index_with_animation.html) already carries. This /light/ page was the one homepage-variant still missing it; completes the canonical pattern across the noindex variants. No visual change to page content. -->
    <link rel="canonical" href="https://jacobhl.com/">
    <script>
        // Force light mode and redirect to main site.
        // Guard localStorage (it can throw in private mode / when storage is blocked)
        // so the redirect still runs even if the theme preference can't be saved.
        try { localStorage.setItem('theme', 'light'); } catch (e) {}
        window.location.replace('/');
    </script>
</head>
<body>
    <p>Redirecting to <a href="/">jacobhl.com</a>...</p>
</body>
</html>
