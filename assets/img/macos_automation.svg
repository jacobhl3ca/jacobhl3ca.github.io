<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0f172a"/>
  <rect x="50" y="25" width="700" height="350" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="60" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="16" font-weight="bold">macOS Automation Scripts</text>
  <text x="400" y="78" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">Bash, AppleScript, Raycast</text>
  <rect x="80" y="95" width="200" height="130" rx="10" fill="#1a1f36" stroke="#334155" stroke-width="1"/>
  <rect x="80" y="95" width="200" height="32" rx="10" fill="#22c55e" opacity="0.15"/>
  <text x="180" y="116" text-anchor="middle" fill="#22c55e" font-family="sans-serif" font-size="12" font-weight="bold">Dock Spacer</text>
  <text x="100" y="142" fill="#94a3b8" font-family="monospace" font-size="9">$ defaults write</text>
  <text x="100" y="156" fill="#94a3b8" font-family="monospace" font-size="9">  com.apple.dock</text>
  <text x="100" y="170" fill="#94a3b8" font-family="monospace" font-size="9">  persistent-apps -array-add</text>
  <text x="100" y="184" fill="#64748b" font-family="monospace" font-size="9">  '{tile-type = "spacer"}'</text>
  <text x="100" y="204" fill="#475569" font-family="sans-serif" font-size="9">Group Dock apps with spacers</text>
  <rect x="300" y="95" width="200" height="130" rx="10" fill="#1a1f36" stroke="#334155" stroke-width="1"/>
  <rect x="300" y="95" width="200" height="32" rx="10" fill="#6366f1" opacity="0.15"/>
  <text x="400" y="116" text-anchor="middle" fill="#6366f1" font-family="sans-serif" font-size="12" font-weight="bold">Menu Bar Toggle</text>
  <text x="320" y="142" fill="#94a3b8" font-family="monospace" font-size="9">tell application</text>
  <text x="320" y="156" fill="#94a3b8" font-family="monospace" font-size="9">  "System Preferences"</text>
  <text x="320" y="170" fill="#94a3b8" font-family="monospace" font-size="9">  set autohide menu bar</text>
  <text x="320" y="184" fill="#64748b" font-family="monospace" font-size="9">  to (not autohide)</text>
  <text x="320" y="204" fill="#475569" font-family="sans-serif" font-size="9">Toggle auto-hide via AppleScript</text>
  <rect x="520" y="95" width="200" height="130" rx="10" fill="#1a1f36" stroke="#334155" stroke-width="1"/>
  <rect x="520" y="95" width="200" height="32" rx="10" fill="#eab308" opacity="0.15"/>
  <text x="620" y="116" text-anchor="middle" fill="#eab308" font-family="sans-serif" font-size="12" font-weight="bold">VPN Toggle</text>
  <text x="540" y="142" fill="#94a3b8" font-family="monospace" font-size="9">#!/bin/bash</text>
  <text x="540" y="156" fill="#94a3b8" font-family="monospace" font-size="9"># @raycast.title</text>
  <text x="540" y="170" fill="#94a3b8" font-family="monospace" font-size="9">mullvad status | grep</text>
  <text x="540" y="184" fill="#64748b" font-family="monospace" font-size="9">mullvad connect/disconnect</text>
  <text x="540" y="204" fill="#475569" font-family="sans-serif" font-size="9">Raycast Mullvad VPN control</text>
  <rect x="80" y="240" width="310" height="120" rx="10" fill="#1a1f36" stroke="#334155" stroke-width="1"/>
  <rect x="80" y="240" width="310" height="32" rx="10" fill="#ef4444" opacity="0.1"/>
  <text x="235" y="261" text-anchor="middle" fill="#ef4444" font-family="sans-serif" font-size="12" font-weight="bold">Game Automation (PyAutoGUI)</text>
  <text x="100" y="288" fill="#94a3b8" font-family="monospace" font-size="9">pyautogui.FAILSAFE = True</text>
  <text x="100" y="302" fill="#94a3b8" font-family="monospace" font-size="9">pyautogui.moveTo(x, y, duration=0.2)</text>
  <text x="100" y="316" fill="#94a3b8" font-family="monospace" font-size="9">pyautogui.click()</text>
  <text x="100" y="338" fill="#475569" font-family="sans-serif" font-size="9">Slay the Spire map reroll + Balatro challenge reroll</text>
  <rect x="410" y="240" width="310" height="120" rx="10" fill="#1a1f36" stroke="#334155" stroke-width="1"/>
  <rect x="410" y="240" width="310" height="32" rx="10" fill="#0ea5e9" opacity="0.1"/>
  <text x="565" y="261" text-anchor="middle" fill="#0ea5e9" font-family="sans-serif" font-size="12" font-weight="bold">Keyboard Backlight Toggle</text>
  <text x="430" y="288" fill="#94a3b8" font-family="monospace" font-size="9">#!/bin/bash</text>
  <text x="430" y="302" fill="#94a3b8" font-family="monospace" font-size="9"># Toggle keyboard backlight</text>
  <text x="430" y="316" fill="#94a3b8" font-family="monospace" font-size="9">osascript -e 'key code 145'</text>
  <text x="430" y="338" fill="#475569" font-family="sans-serif" font-size="9">macOS keyboard brightness on/off</text>
</svg>
