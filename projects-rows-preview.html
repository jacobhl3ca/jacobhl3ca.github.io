<!DOCTYPE html>
<!-- lang="en-US" (not the broader "en") to match every other page site-wide: index.html, index_with_animation.html, 404.html, building.html, tidytab.html, projects-stack-preview.html, projects/index_cascade_animate.html, weather/, light/ all declare en-US — this "projects rows" preview was the one page still on the bare "en". A more specific, valid BCP-47 tag gives assistive tech the correct US-English pronunciation/voice and search engines one consistent language signal. No visual change. -->
<html lang="en-US" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- noindex, follow: this unlinked, sitemap-absent "projects rows" preview renders the same project cards as the homepage's projects section, so leaving it indexable created a duplicate-content risk against the real homepage. It carries no canonical/og tags of its own to disambiguate it, which makes the risk worse. Now matches the site's established pattern for alternate/experiment pages (index_with_animation.html, light/index.html, projects-stack-preview.html, projects/index_cascade_animate.html all noindex, follow). Metadata only — no visual change. -->
<meta name="robots" content="noindex, follow">
<!-- Canonical → the real homepage. This noindex "projects rows" preview near-duplicates the homepage's projects section, and was the one homepage variant still missing a canonical — its three siblings (index_with_animation.html, projects-stack-preview.html, projects/index_cascade_animate.html) all carry rel=canonical → jacobhl.com. Consolidates any link signals for this URL onto the real homepage, reinforcing the existing noindex, follow (the run that added the robots directive noted this page carried no canonical to disambiguate it). Metadata only — no visual change. -->
<link rel="canonical" href="https://jacobhl.com/">
<title>Projects rows — preview</title>
<!-- load the REAL site styles so this matches exactly -->
<link rel="stylesheet" href="assets/css/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css" rel="stylesheet">
<style>
  body{font-family:var(--body-font)}
  .proj-wrap{max-width:780px;margin:0 auto;padding:0 1.5rem}

  /* ---- ROW CARD (mirrors .work__img shadow/radius, laid out horizontally) ---- */
  .proj-row{
    background:#fff;border-radius:.5rem;overflow:hidden;margin-bottom:1.5rem;
    box-shadow:0px 4px 25px rgba(14,36,49,.15);
    transition:transform .25s ease, box-shadow .25s ease;
  }
  [data-theme="dark"] .proj-row{background:var(--container-bg);box-shadow:0px 4px 25px rgba(0,0,0,.3);}
  .proj-row:hover{transform:translateY(-2px);}

  .proj-head{display:flex;align-items:stretch;gap:1.1rem;padding:.85rem;cursor:pointer;}
  /* thumb stretches to the SAME height as the text+icons column (align-self:stretch) */
  .proj-thumb{flex:0 0 200px;align-self:stretch;min-height:104px;border-radius:.4rem;overflow:hidden;
    position:relative;background:#0f0f0f;cursor:pointer;}
  .proj-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;transition:transform .9s ease;}
  .proj-thumb.pos-top img{object-position:top;}
  .proj-thumb:hover img{transform:scale(1.08);}
  .proj-cue{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(8,10,18,.40);opacity:0;transition:opacity .2s ease;}
  .proj-thumb:hover .proj-cue{opacity:1;}
  .proj-cue span{display:inline-flex;align-items:center;gap:.4rem;font-size:.75rem;font-weight:600;
    color:#fff;background:rgba(20,26,42,.92);border:1px solid rgba(255,255,255,.25);
    padding:.42rem .8rem;border-radius:999px;}
  .proj-thumb.no-live{cursor:pointer;}
  .proj-thumb.no-live:hover img{transform:none;}
  .proj-thumb.no-live .proj-cue{display:none;}

  .proj-info{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;}
  .proj-title{display:flex;align-items:center;font-size:1.15rem;font-weight:var(--font-semi);
    color:var(--second-color);margin:0 0 .3rem;}
  .proj-info .live-dot{flex:0 0 auto;}
  .proj-one{font-size:var(--normal-font-size);line-height:1.5;margin:0;
    color:var(--second-color);opacity:.72;}
  /* CTAs pinned to the bottom of the text column (room freed by top-aligning the text) */
  .proj-info .work__cta{margin-top:auto;justify-content:flex-start;padding-top:.8rem;}
  .proj-info img.app-store-badge{height:40px;width:auto;}

  .proj-chev{flex:0 0 auto;align-self:center;width:38px;height:38px;border-radius:.45rem;cursor:pointer;
    border:1px solid #a6a6a6;background:transparent;color:var(--second-color);
    display:flex;align-items:center;justify-content:center;transition:all .25s ease;}
  .proj-chev i{font-size:1.5rem;line-height:1;transition:transform .25s ease;}
  .proj-chev:hover{color:var(--first-color);border-color:var(--first-color);}
  [data-theme="dark"] .proj-chev{color:#e0e0e0;}
  .proj-row.open .proj-chev{color:var(--first-color);border-color:var(--first-color);}
  .proj-row.open .proj-chev i{transform:rotate(180deg);}

  /* ---- COLLAPSIBLE DETAIL (block, full width — sits BELOW the head, no flex squeeze) ---- */
  .proj-detail{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s ease;}
  .proj-row.open .proj-detail{grid-template-rows:1fr;}
  .proj-detail-in{overflow:hidden;min-height:0;}
  .proj-detail .pad{padding:.2rem 1.25rem 1.15rem;border-top:1px solid rgba(128,140,170,.18);
    margin:0 .85rem;}
  .proj-detail p{font-size:var(--normal-font-size);line-height:1.65;margin:.9rem 0 0;
    color:var(--second-color);opacity:.85;}
  .proj-detail .work__cta{justify-content:flex-start;margin-top:.9rem;padding-top:0;}
  .proj-detail img.app-store-badge{height:42px;width:auto;}
  .gh-link{display:inline-flex;align-items:center;gap:.4rem;height:42px;padding:0 .9rem;
    border:1px solid #a6a6a6;border-radius:5px;text-decoration:none;color:var(--second-color);
    font-size:var(--smaller-font-size);font-weight:600;transition:all .3s ease;}
  .gh-link:hover{background:var(--first-color);color:#fff;border-color:var(--first-color);transform:translateY(-2px);}
  [data-theme="dark"] .gh-link{color:#e0e0e0;}
  .gh-link i{font-size:1.35rem;}
  /* download button stands out (filled accent) */
  .dl-link, [data-theme="dark"] .dl-link{background:var(--first-color);color:#fff;border-color:var(--first-color);}
  .dl-link:hover{filter:brightness(1.08);background:var(--first-color);color:#fff;transform:translateY(-2px);}

  /* ---- OTHER PROJECTS DROPDOWN ---- */
  .more-toggle{display:flex;align-items:center;justify-content:center;gap:.55rem;margin:.5rem auto 0;
    background:transparent;border:1px solid #a6a6a6;border-radius:999px;cursor:pointer;
    font-family:var(--body-font);font-size:var(--smaller-font-size);font-weight:600;letter-spacing:.02em;
    color:var(--second-color);padding:.65rem 1.5rem;transition:all .25s ease;}
  [data-theme="dark"] .more-toggle{color:#e0e0e0;}
  .more-toggle:hover{color:var(--first-color);border-color:var(--first-color);}
  .more-toggle i{font-size:1.4rem;transition:transform .3s ease;}
  .more-toggle.open i{transform:rotate(180deg);}
  .more-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s ease;}
  .more-wrap.open{grid-template-rows:1fr;}
  .more-inner{overflow:hidden;min-height:0;}
  .more-inner .padtop{padding-top:1.6rem;}

  /* ---- LIVE PREVIEW MODAL ---- */
  .modal{position:fixed;inset:0;background:rgba(6,9,18,.80);backdrop-filter:blur(5px);
    display:none;align-items:center;justify-content:center;z-index:200;padding:24px;}
  .modal.open{display:flex;}
  .modal-card{width:min(980px,100%);height:min(80vh,840px);background:#0c0e12;
    border:1px solid #2a3242;border-radius:.7rem;overflow:hidden;display:flex;flex-direction:column;
    box-shadow:0 30px 80px rgba(0,0,0,.6);transform-origin:center bottom;
    transition:transform .34s cubic-bezier(.34,.01,.21,1), opacity .3s ease, width .34s ease, height .34s ease, border-radius .34s ease;}
  /* yellow = minimize: genie-ish shrink toward the bottom, then close */
  .modal-card.minimizing{transform:translateY(62vh) scale(.18) rotateX(8deg);opacity:0;}
  /* green = expand: animate the card to fill the whole screen */
  .modal.fullscreen{padding:0;}
  .modal.fullscreen .modal-card{width:100%;height:100%;max-width:100%;border-radius:0;border:0;}
  .modal.fullscreen .modal-bar{display:none;}
  /* big back button shown only in fullscreen, floating over the site */
  .fs-back{position:absolute;top:18px;left:18px;z-index:6;display:none;align-items:center;gap:.45rem;
    padding:.6rem 1.1rem .6rem .85rem;border:0;border-radius:999px;cursor:pointer;
    background:rgba(12,14,18,.82);backdrop-filter:blur(6px);color:#fff;font-family:var(--body-font);
    font-size:.92rem;font-weight:600;box-shadow:0 6px 24px rgba(0,0,0,.45);transition:background .2s ease, transform .2s ease;}
  .fs-back:hover{background:rgba(20,24,34,.95);transform:translateX(-2px);}
  .fs-back i{font-size:1.4rem;}
  .modal.fullscreen .fs-back{display:inline-flex;}
  .modal-bar{display:flex;align-items:center;gap:.6rem;padding:.5rem .7rem;background:#11141a;
    border-bottom:1px solid #232a36;}
  /* functional traffic-light dots: red=close, yellow=minimize, green=expand to fullscreen */
  .modal-bar .dots{display:flex;gap:.45rem;}
  .modal-bar .dots .dot{width:13px;height:13px;border-radius:50%;border:0;padding:0;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;line-height:1;
    color:rgba(0,0,0,.55);font-family:var(--body-font);}
  .dot.red{background:#ff5f57;}.dot.yellow{background:#febc2e;}.dot.green{background:#28c840;}
  .dots .dot span{opacity:0;transition:opacity .15s ease;}
  .modal-bar:hover .dots .dot span{opacity:1;}
  .nav-btn{flex:0 0 auto;width:30px;height:30px;border-radius:6px;border:1px solid #2a3242;background:#1a1f29;
    color:#9aa3b4;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s ease;}
  .nav-btn:hover{color:#fff;border-color:#3a445a;}
  .nav-btn i{font-size:1.15rem;}
  .url-form{flex:1;display:flex;}
  .modal-url{flex:1;width:100%;font-size:.8rem;color:#cdd3df;background:#1a1f29;border:1px solid #232a36;
    border-radius:6px;padding:.42rem .8rem;text-align:center;outline:none;font-family:var(--body-font);
    transition:border-color .2s ease, background .2s ease;}
  .modal-url:focus{border-color:var(--first-color);text-align:left;background:#11141a;}
  .modal-bar a.openext{flex:0 0 auto;display:flex;align-items:center;justify-content:center;width:30px;height:30px;
    color:#9aa3b4;text-decoration:none;border-radius:6px;transition:all .2s ease;}
  .modal-bar a.openext:hover{color:var(--first-color);background:#1a1f29;}
  .modal-bar a.openext i{font-size:1.2rem;}
  .modal-bar button.mclose{flex:0 0 auto;background:none;border:0;color:#9aa3b4;font-size:1.5rem;cursor:pointer;line-height:1;padding:0 .35rem;}
  .modal-bar button.mclose:hover{color:#fff;}
  .modal-body{flex:1;position:relative;background:#0c0e12;}
  /* iframe sits ON TOP (z-index 2) with a transparent bg; the loader is BEHIND it (z-index 1),
     so the moment the site paints it covers the spinner — the overlay can never hide a working site */
  .modal-frame{position:absolute;inset:0;border:0;width:100%;height:100%;background:transparent;z-index:2;}
  /* "Press Esc to exit" hint — shown only while the pointer/focus is inside the cross-origin
     preview iframe (.frame-focused), since that's when a plain Esc can't reach the parent. */
  .esc-hint{position:absolute;top:10px;right:10px;z-index:3;display:none;align-items:center;gap:.4rem;
    padding:.32rem .6rem;border:0;border-radius:7px;cursor:pointer;font:inherit;font-size:.74rem;
    color:#e6e9ef;background:rgba(12,14,18,.82);backdrop-filter:blur(6px);box-shadow:0 2px 10px rgba(0,0,0,.4);}
  .esc-hint kbd{font:inherit;font-size:.7rem;padding:.05rem .34rem;border-radius:4px;background:#2a3242;color:#fff;}
  .esc-hint:hover{background:rgba(20,24,30,.95);}
  .modal.frame-focused .esc-hint{display:inline-flex;}
  .modal-load{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:.7rem;background:#0c0e12;color:#9aa3b4;font-size:.85rem;z-index:1;transition:opacity .25s ease;}
  .modal-load.hidden{opacity:0;pointer-events:none;}
  .modal-load .spin{width:30px;height:30px;border:3px solid #2a3242;border-top-color:var(--first-color);
    border-radius:50%;animation:spin 0.8s linear infinite;}
  .modal-load a{color:var(--first-color);text-decoration:none;}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:576px){
    .proj-thumb{flex-basis:132px;min-height:88px;}
    .proj-title{font-size:1.02rem;}
    .proj-head{gap:.8rem;padding:.7rem;}
  }
</style>
</head>
<body>
<main class="l-main">
  <section class="section">
    <div class="proj-wrap">
      <h2 class="section-title">Projects</h2>

      <div id="main-rows"></div>

      <button class="more-toggle" id="moreToggle">
        <span id="moreLabel">Other projects</span>
        <i class='bx bx-chevron-down'></i>
      </button>
      <div class="more-wrap" id="moreWrap"><div class="more-inner"><div class="padtop">
        <div id="more-rows"></div>
      </div></div></div>
    </div>
  </section>
</main>

<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-bar">
      <div class="dots">
        <button class="dot red" id="dotClose" title="Close"><span>×</span></button>
        <button class="dot yellow" id="dotMin" title="Minimize"><span>–</span></button>
        <button class="dot green" id="dotExpand" title="Expand to full screen"><span>⤢</span></button>
      </div>
      <button class="nav-btn" id="navBack" title="Back" style="display:none;"><i class='bx bx-chevron-left'></i></button>
      <button class="nav-btn" id="navReload" title="Reload"><i class='bx bx-revision'></i></button>
      <form class="url-form" id="urlForm"><input class="modal-url" id="modalUrl" type="text" spellcheck="false" autocomplete="off" aria-label="Preview address"></form>
      <a class="openext" id="modalOpen" target="_blank" rel="noopener" title="Open in new tab"><i class='bx bx-link-external'></i></a>
      <button class="mclose" id="modalClose" title="Close">×</button>
    </div>
    <div class="modal-body">
      <button class="fs-back" id="fsBack" title="Back to projects"><i class='bx bx-arrow-back'></i> Back</button>
      <div class="modal-load" id="modalLoad"><div class="spin"></div><span id="modalLoadTxt">Loading preview…</span></div>
      <iframe class="modal-frame" id="modalFrame" title="Live preview" referrerpolicy="no-referrer-when-downgrade"></iframe>
      <button class="esc-hint" id="escHint" type="button" title="Exit preview">Press <kbd>Esc</kbd> to exit</button>
    </div>
  </div>
</div>

<script>
const MAIN = [
  { title:"HideScore", live:true, img:"assets/img/hidescore.png", pos:"top", url:"https://hidescore.com",
    one:"Watch sports highlights without seeing the score.",
    full:"Watch sports highlights without seeing the score. Covers MLB, NBA, NHL, and more with score-hidden cards, embedded highlights, and a unified news view — without spoiling anything you haven't watched.",
    site:"https://hidescore.com", appstore:"https://apps.apple.com/app/hidescore/id6766885311" },
  { title:"Tonight NYC", live:true, img:"assets/img/cellar_tonight.png", pos:"top", url:"https://tonightnyc.com",
    one:"Every NYC comedy show, filtered to your favorite comedians.",
    full:"No more digging for comedy showtimes, stick to your favorite comedians. Includes every NYC show from the Comedy Cellar, The Stand, and more, filtered your way. Mark favorites and skips, see which set to attend at a glance, and book directly.",
    site:"https://tonightnyc.com", appstore:"https://apps.apple.com/app/id6763027650" },
  { title:"Subway Times", live:true, img:"assets/img/subway_times.png", pos:"top", url:"https://subwaytimes.com",
    one:"Real-time NYC subway arrivals, faster than Maps.",
    full:"Quicker than Google Maps for simple departures, especially from your home station. Real-time NYC subway arrivals, where you can favorite your stations, see countdown timers down to the second, and get out the door faster.",
    site:"https://subwaytimes.com" },
  { title:"David Licht", live:true, img:"assets/img/davidlicht.jpg", url:"https://davidlicht.com",
    one:"A showcase site for my dad — five decades of drumming.",
    full:"A showcase site I built for my dad — a drummer for five decades, from downtown NYC noise bands to the Grammy-winning Klezmatics. His story, music, and photos in one place.",
    site:"https://davidlicht.com" },
  // ref (hidden from site): "Developer ID-signed and Apple-notarized, so it downloads and opens cleanly (Python, rumps, py2app)."
  { title:"TidyTab", live:false, img:"assets/img/tidytab.png",
    one:"Bulk unpin or close Safari pinned tabs — a macOS menu-bar app.",
    full:"A menu-bar app I built to bulk unpin or close Safari pinned tabs in one sweep — it auto-detects your pinned tabs and clears them (press Space to stop).",
    download:"https://github.com/jacobhl3ca/safari-pinned-tab-automation/releases/latest/download/TidyTab.dmg" },
];
const MORE = [
  { title:"Spotify Analytics", img:"assets/img/spotify_monthly.png",
    one:"Interactive dashboard of my listening trends — beyond Wrapped.",
    full:"Summarize listening trends without relying on annual Spotify Wrapped — an interactive dashboard with top songs/artists/albums, heatmaps, skip-rate analysis, artist evolution timelines, session tracking, and a listening clock (Python, Plotly, Streamlit)." },
  { title:"Spotify Playlist Archiver", img:"assets/img/spotify_archiver.png",
    one:"Auto-archives playlists that would otherwise disappear.",
    full:"Automatic weekly archiver of playlists that would otherwise disappear — Discover Weekly, Release Radar, and Your Top Songs at different granularities. Uses PyAutoGUI automation for playlists unavailable via API, and the Spotify API for top tracks with rate-limit handling (Python, Spotipy)." },
  { title:"Personal Finance App", img:"assets/img/finance_trend_crop.png",
    one:"Daily budgeting, investment planning, and optimization.",
    full:"Enables precise daily budgeting, investment planning, and optimization (Python, Apps Script)." },
  { title:"E-commerce Store", img:"assets/img/stripe_dark.svg",
    one:"Full-stack store with Stripe checkout.",
    full:"Full-stack e-commerce site with Stripe payment processing and an Express.js backend (Node.js, Stripe API, HTML/CSS/JS)." },
  { title:"Automation Utilities", img:"assets/img/automation_dark.svg",
    one:"macOS automation suite — system toggles, timesheet autofill, and more.",
    full:"macOS productivity automation suite including timesheet autofill via keystroke injection, system toggles (menu bar hide/show, dark/light mode, VPN connect/disconnect), keyboard backlight control, dock spacer grouping, and game re-roll automation (Python, AppleScript, Bash, PyAutoGUI). The Safari pinned-tab tool from this suite ships separately as TidyTab.",
    github:"https://github.com/jacobhl3ca/safari-pinned-tab-automation" },
  { title:"System Administration", img:"assets/img/docker_dark.png",
    one:"Self-hosted apps & services on a Linux server.",
    full:"Self-hosted web apps and network services on a Linux server — Plex media automation stack, Portainer, and Plausible Analytics (Docker, Docker Compose, PostgreSQL, ClickHouse)." },
];

function ctaHTML(p){
  let h='';
  if(p.site) h+=`<a href="${p.site}" target="_blank" rel="noopener" class="site-link" title="Visit website"><i class='bx bx-globe'></i></a>`;
  if(p.appstore) h+=`<a href="${p.appstore}" target="_blank" rel="noopener" class="app-store-badge-link"><img src="assets/img/app-store-badge.svg" alt="Download on the App Store" class="app-store-badge"></a>`;
  if(p.download) h+=`<a href="${p.download}" class="gh-link dl-link" title="Download TabTidy for macOS (.dmg, notarized)"><i class='bx bxl-apple'></i>Download for Mac</a>`;
  if(p.github) h+=`<a href="${p.github}" target="_blank" rel="noopener" class="gh-link"><i class='bx bxl-github'></i>GitHub</a>`;
  return h ? `<div class="work__cta">${h}</div>` : '';
}
function rowHTML(p){
  const dot = p.live ? '<span class="live-dot is-visible" title="Live"></span>' : '';
  const thumbCls = (p.live?'':'no-live') + (p.pos==='top'?' pos-top':'');
  return `
  <div class="proj-row">
    <div class="proj-head">
      <div class="proj-thumb ${thumbCls}" ${p.live?`data-url="${p.url}"`:''}>
        <img src="${p.img}" alt="${p.title}" loading="lazy">
        <div class="proj-cue"><span><i class='bx bx-expand-alt'></i> Preview</span></div>
      </div>
      <div class="proj-info">
        <h3 class="proj-title">${dot}${p.title}</h3>
        <p class="proj-one">${p.one}</p>
        ${ctaHTML(p)}
      </div>
      <button class="proj-chev" aria-label="Show details"><i class='bx bx-chevron-down'></i></button>
    </div>
    <div class="proj-detail"><div class="proj-detail-in"><div class="pad">
      <p>${p.full}</p>
    </div></div></div>
  </div>`;
}

document.getElementById('main-rows').innerHTML = MAIN.map(rowHTML).join('');
document.getElementById('more-rows').innerHTML = MORE.map(rowHTML).join('');

// click anywhere on the card toggles expand — EXCEPT a live thumbnail (opens preview) and CTA links.
// "Other projects" have no live preview, so clicking their thumbnail expands the card like the rest.
document.querySelectorAll('.proj-head').forEach(h=>{
  h.addEventListener('click', e=>{
    if(e.target.closest('.proj-thumb[data-url]')) return; // only LIVE thumbnails open the preview
    if(e.target.closest('a')) return;                     // let the site / App Store links work
    h.closest('.proj-row').classList.toggle('open');
  });
});

const modal=document.getElementById('modal'), card=modal.querySelector('.modal-card'),
      frame=document.getElementById('modalFrame'),
      mUrl=document.getElementById('modalUrl'), mOpen=document.getElementById('modalOpen'),
      mLoad=document.getElementById('modalLoad'), mLoadTxt=document.getElementById('modalLoadTxt'),
      navBack=document.getElementById('navBack');
let loadTimer=null, currentUrl='', backStack=[], sourceThumb=null;

function updateBack(){ navBack.style.display = backStack.length ? 'flex' : 'none'; }
// push=true records the prior page so the toolbar back button can return to it
function navigate(url, push){
  if(push && currentUrl && currentUrl!==url) backStack.push(currentUrl);
  currentUrl=url; updateBack();
  mLoad.classList.remove('hidden'); mLoadTxt.innerHTML='Loading preview…';
  frame.src=url; mUrl.value=url; mOpen.href=url;
  clearTimeout(loadTimer);
  loadTimer=setTimeout(()=>{ mLoadTxt.innerHTML=`Taking a while — <a href="${url}" target="_blank" rel="noopener">open ${url} ↗</a>`; }, 6000);
}
function openModal(url, srcEl){ sourceThumb=srcEl||null; backStack=[]; modal.classList.remove('fullscreen'); card.classList.remove('minimizing');
  card.style.transform=''; card.style.opacity=''; card.style.transformOrigin='';
  navigate(url,false); modal.classList.add('open'); document.body.style.overflow='hidden'; }
function closeModal(){ modal.classList.remove('open','fullscreen'); card.classList.remove('minimizing');
  card.style.transform=''; card.style.opacity=''; card.style.transformOrigin='';
  frame.src='about:blank'; document.body.style.overflow=''; clearTimeout(loadTimer); }
function reload(){ if(currentUrl) navigate(currentUrl,false); }
function goBack(){ if(backStack.length) navigate(backStack.pop(), false); }
// yellow dot — minimize: genie back into the exact thumbnail it was opened from, then close
function minimize(){
  const c=card.getBoundingClientRect();
  if(sourceThumb){
    const t=sourceThumb.getBoundingClientRect();
    const scale=Math.max(0.04, t.width/c.width);
    const tx=(t.left+t.width/2)-(c.left+c.width/2);
    const ty=(t.top+t.height/2)-(c.top+c.height/2);
    card.style.transformOrigin='center center';
    card.style.transform=`translate(${tx}px, ${ty}px) scale(${scale})`;
    card.style.opacity='0';
  } else { card.classList.add('minimizing'); }
  setTimeout(closeModal, 360);
}
// green dot — expand the preview to fill the screen (and back)
function setFullscreen(on){ modal.classList.toggle('fullscreen', on); }
frame.addEventListener('load', ()=>{ if(frame.src && !frame.src.endsWith('about:blank')){ mLoad.classList.add('hidden'); clearTimeout(loadTimer);} });

document.querySelectorAll('.proj-thumb[data-url]').forEach(t=> t.addEventListener('click', ()=>openModal(t.dataset.url, t)));
// functional window controls
document.getElementById('dotClose').addEventListener('click', closeModal);
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('dotMin').addEventListener('click', minimize);
document.getElementById('dotExpand').addEventListener('click', ()=> setFullscreen(!modal.classList.contains('fullscreen')));
document.getElementById('fsBack').addEventListener('click', ()=> setFullscreen(false));
navBack.addEventListener('click', goBack);
document.getElementById('navReload').addEventListener('click', reload);
document.getElementById('urlForm').addEventListener('submit', e=>{
  e.preventDefault();
  let u=mUrl.value.trim(); if(!u) return;
  if(!/^https?:\/\//i.test(u)) u='https://'+u;
  navigate(u, true); mUrl.blur();   // typed/searched URL records history → back button appears
});
modal.addEventListener('click', e=>{ if(e.target===modal) closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ if(modal.classList.contains('fullscreen')) setFullscreen(false); else closeModal(); } });
// Esc-while-inside-the-preview fix: once the user clicks into the cross-origin iframe,
// keystrokes go to that frame and never reach the parent's Esc handler above. We can't
// read keys across origins, so instead we RECLAIM keyboard focus to the dialog the moment
// the pointer comes back over the modal chrome (the toolbar / margins around the iframe —
// mousemove never fires while the pointer is over the iframe itself). After that nudge the
// next Esc lands on the parent and closes the preview. A persistent hint tells the user.
let frameFocused=false;
window.addEventListener('blur', ()=>{
  if(modal.classList.contains('open') && document.activeElement===frame){
    frameFocused=true; modal.classList.add('frame-focused');
  }
});
window.addEventListener('focus', ()=>{ frameFocused=false; modal.classList.remove('frame-focused'); });
function reclaimFocus(){
  if(!frameFocused) return;
  frameFocused=false; modal.classList.remove('frame-focused');
  document.getElementById('modalClose').focus({preventScroll:true});
}
modal.addEventListener('mousemove', reclaimFocus);
modal.addEventListener('mouseenter', reclaimFocus);
// Clicking the hint itself just gets out.
document.getElementById('escHint').addEventListener('click', closeModal);
// allow headless/manual verification: #preview=<url> opens that modal on load
if(location.hash.indexOf('#preview=')===0){ openModal(decodeURIComponent(location.hash.slice(9))); if(location.search.indexOf('fs')>=0) setFullscreen(true); }

const mt=document.getElementById('moreToggle'), mw=document.getElementById('moreWrap'), ml=document.getElementById('moreLabel');
mt.addEventListener('click', ()=>{
  const open=mw.classList.toggle('open'); mt.classList.toggle('open',open);
  ml.textContent = open ? 'Hide other projects' : 'Other projects';
});
if(location.hash==='#more'){ mw.classList.add('open'); mt.classList.add('open'); ml.textContent='Hide other projects'; }
</script>
</body>
