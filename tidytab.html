<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <!-- Give the visible fallback (the <p> below, shown when the instant JS/meta-refresh redirect is slow or blocked) proper mobile scaling. tidytab.html was the one page site-wide still missing a viewport meta — every other page (index.html, 404.html, building.html, weather/, light/, and the preview pages) declares it. Without it, mobile browsers render at a 980px desktop width and zoom out, shrinking the fallback text; with it the fallback reads at device width. Completes the site-wide viewport pattern. No effect on the normal redirect path. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Declare supported colour schemes up front. This page carries no CSS at all, so its visible fallback (the <p> below, shown when the instant JS/meta-refresh redirect is slow or blocked) renders with the UA default background/text. Without color-scheme an OS-dark browser paints the root canvas dark while treating the page as light, giving dark-on-dark (or a mismatched flash) for the fallback. "light dark" lets the bare page adapt to the visitor's OS theme so the fallback stays readable either way. tidytab.html was the one production page site-wide still missing this — every other page (index.html, 404.html, building.html, weather/, light/) already declares it. No effect on the normal redirect path. -->
  <meta name="color-scheme" content="light dark">
  <title>TidyTab — moved to tidytab.jacobhl.com</title>
  <link rel="canonical" href="https://tidytab.jacobhl.com/">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0; url=https://tidytab.jacobhl.com/">
  <script>location.replace("https://tidytab.jacobhl.com/" + location.hash);</script>
</head>
<body>
  <p>TidyTab has moved to <a href="https://tidytab.jacobhl.com/">tidytab.jacobhl.com</a>.</p>
</body>
</html>
