<!DOCTYPE html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/assets/css/styles.css">
        <link rel="icon" type="image/x-icon" href="/assets/img/favicon.ico">
        <link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>
        <title>Page Not Found — Jacob Heifetz-Licht</title>
        <style>
            .error-page {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 80vh;
                text-align: center;
                padding: 2rem;
            }
            .error-code {
                font-size: 8rem;
                font-weight: 700;
                color: var(--first-color);
                line-height: 1;
                margin-bottom: 0.5rem;
            }
            .error-message {
                font-size: 1.5rem;
                color: var(--second-color);
                margin-bottom: 1rem;
            }
            .error-description {
                font-size: 1rem;
                color: var(--second-color);
                opacity: 0.7;
                margin-bottom: 2rem;
                max-width: 400px;
            }
            [data-theme="dark"] .error-message,
            [data-theme="dark"] .error-description {
                color: #e0e0e0;
            }
            [data-theme="dark"] .error-page {
                background-color: var(--body-bg);
            }

            /* Back to top button (hidden on 404 but needed for CSS) */
            .back-to-top { display: none; }
        </style>
    </head>
    <body>
        <!--===== HEADER =====-->
        <header class="l-header">
            <nav class="nav bd-grid">
                <div>
                    <a href="/" class="nav__logo">Jacob</a>
                </div>
                <div class="nav__menu" id="nav-menu">
                    <ul class="nav__list">
                        <li class="nav__item"><a href="/" class="nav__link">Home</a></li>
                        <li class="nav__item"><a href="/#about" class="nav__link">About</a></li>
                        <li class="nav__item"><a href="/#skills" class="nav__link">Skills</a></li>
                        <li class="nav__item"><a href="/#Projects" class="nav__link">Projects</a></li>
                        <li class="nav__item"><a href="/#contact" class="nav__link">Contact</a></li>
                    </ul>
                </div>
                <div style="display: flex; align-items: center;">
                    <button id="theme-toggle" class="theme-toggle" style="position: relative; top: -2px;">
                        <i class='bx bx-sun' id="theme-icon"></i>
                    </button>
                    <div class="nav__toggle" id="nav-toggle">
                        <i class='bx bx-menu'></i>
                    </div>
                </div>
            </nav>
        </header>

        <main class="l-main">
            <div class="error-page">
                <div class="error-code">404</div>
                <p class="error-message">Page not found</p>
                <p class="error-description">The page you're looking for doesn't exist or has been moved.</p>
                <a href="/" class="button">Back to Home</a>
            </div>
        </main>

        <!--===== FOOTER =====-->
        <footer class="footer">
            <p class="footer__title">Jacob</p>
            <div class="footer__social">
                <a href="https://www.linkedin.com/in/jacobhl/" class="footer__icon" target="_blank"><i class='bx bxl-linkedin'></i></a>
                <a href="https://github.com/jacobhl3ca" class="footer__icon" target="_blank"><i class='bx bxl-github'></i></a>
                <a href="mailto:hi@jacobhl.com" class="footer__icon" target="_blank"><i class='bx bx-envelope'></i></a>
                <a href="/#contact" class="footer__icon"><i class='bx bx-file'></i></a>
            </div>
            <p class="footer__copy">Let's get you back!</p>
        </footer>

        <!--===== SCROLL REVEAL =====-->
        <script src="https://unpkg.com/scrollreveal"></script>

        <!--===== MAIN JS (handles theme toggle, nav, etc.) =====-->
        <script src="/assets/js/main.js"></script>
    </body>
</html>
