<!DOCTYPE html>
<html lang="en-US" data-theme="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="theme-color" content="#090f20">
        <!-- Declare supported colour schemes to the UA up front. color-scheme is otherwise only set inside the render-blocking styles.css (:root=light, [data-theme="dark"]=dark), so before that CSS loads the browser doesn't know this is a dark-default page and paints the root canvas/scrollbars with the OS default (a brief light flash for the majority dark view). "dark light" matches the document's literal default (<html data-theme="dark">) while still advertising light-mode support (the inline script above can switch to light); the CSS color-scheme rules take over once loaded. Mirrors index.html. No visual change to the settled page. -->
        <meta name="color-scheme" content="dark light">
        <meta name="robots" content="noindex, follow">
        <link rel="stylesheet" href="/assets/css/styles.css">
        <link rel="icon" type="image/x-icon" href="/assets/img/favicon.ico">
        <link rel="preconnect" href="https://cdn.jsdelivr.net"> <!-- early-connect for the render-blocking boxicons CSS fetch (non-CORS, so it can't reuse the crossorigin socket below) -->
        <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin> <!-- early-connect for the boxicons icon font (CORS woff2, crossorigin so the warmed socket is reused) -->
        <link rel="preconnect" href="https://fonts.googleapis.com"> <!-- early-connect to Google Fonts CSS (styles.css @imports Poppins from here, on the critical path) -->
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <!-- early-connect to the Google Fonts file host; crossorigin so the warmed socket is reused for the CORS woff2 fetch -->
        <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"> <!-- styles.css @imports Poppins, but @import isn't discoverable until styles.css has downloaded + parsed, so the font CSS fetch is serialized on the critical path; preload it (same URL) so the browser fetches it in parallel up front and the @import then resolves from cache. Mirrors index.html; kept identical to the @import (now includes weight 500) so the preload still satisfies it. -->
        <link rel="dns-prefetch" href="//gc.zgo.at"> <!-- resolve the GoatCounter analytics host ahead of the async count.js fetch at end of body (mirrors index.html) -->
        <link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>
        <script>
            // Apply the saved theme before paint so light-mode users don't see a dark flash
            // (the document defaults to data-theme="dark"; main.js loads at the end of <body>).
            try {
                if (localStorage.getItem('theme') === 'light') {
                    document.documentElement.removeAttribute('data-theme');
                    // Sync the mobile address-bar colour to the light header before first paint
                    // (main.js does this too, but only later at the end of <body>).
                    var tc = document.querySelector('meta[name="theme-color"]');
                    if (tc) tc.setAttribute('content', '#ffffff');
                }
            } catch (e) {}
        </script>
        <title>Page Not Found — Jacob Heifetz-Licht</title>
        <meta name="description" content="The page you're looking for doesn't exist or has been moved. Head back to jacobhl.com — the portfolio of Jacob Heifetz-Licht, analytics manager and web developer.">
        <!-- Name the document's author for consistency with the site's other pages (index.html, weather/, and light/ all declare this); the 404 was the only page missing it. Purely document metadata surfaced by some browsers/tools/reader modes; no visual change and no effect on the page's noindex status. -->
        <meta name="author" content="Jacob Heifetz-Licht">
        <!-- Open Graph / Twitter meta so a shared or mistyped jacobhl.com link (which serves this 404) still gets a branded preview instead of a blank one. og:url is intentionally omitted since this page is served for many different URLs. Mirrors index.html. -->
        <meta property="og:title" content="Page Not Found — Jacob Heifetz-Licht">
        <meta property="og:description" content="This page doesn't exist or has been moved. Head back to jacobhl.com — the portfolio of Jacob Heifetz-Licht, analytics manager and web developer.">
        <meta property="og:image" content="https://jacobhl.com/assets/img/og_image.png">
        <meta property="og:image:type" content="image/png">
        <meta property="og:image:width" content="1200">
        <meta property="og:image:height" content="630">
        <meta property="og:image:alt" content="Jacob Heifetz-Licht — Analytics Manager and web developer">
        <meta property="og:type" content="website">
        <meta property="og:site_name" content="Jacob Heifetz-Licht">
        <meta property="og:locale" content="en_US">
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Page Not Found — Jacob Heifetz-Licht">
        <meta name="twitter:description" content="This page doesn't exist or has been moved. Head back to jacobhl.com — the portfolio of Jacob Heifetz-Licht, analytics manager and web developer.">
        <meta name="twitter:image" content="https://jacobhl.com/assets/img/og_image.png">
        <meta name="twitter:image:alt" content="Jacob Heifetz-Licht — Analytics Manager and web developer">
        <style>
            .error-page {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 80vh;
                text-align: center;
                padding: 2rem;
            }
            .error-code {
                font-size: 8rem;
                font-weight: 700;
                color: var(--first-color);
                line-height: 1;
                margin-bottom: 0.5rem;
            }
            .error-message {
                font-size: 1.5rem;
                color: var(--second-color);
                margin-bottom: 1rem;
            }
            .error-description {
                font-size: 1rem;
                color: var(--second-color);
                opacity: 0.7;
                margin-bottom: 2rem;
                max-width: 400px;
            }
            [data-theme="dark"] .error-message,
            [data-theme="dark"] .error-description {
                color: #e0e0e0;
            }
            [data-theme="dark"] .error-page {
                background-color: var(--body-bg);
            }

            /* Back to top button (hidden on 404 but needed for CSS) */
            .back-to-top { display: none; }
        </style>
    </head>
    <body>
        <a href="#main-content" class="skip-link">Skip to main content</a>
        <!--===== HEADER =====-->
        <header class="l-header">
            <nav class="nav bd-grid" aria-label="Primary"> <!-- name the primary navigation landmark so screen-reader landmark menus read "Primary navigation" instead of a generic, unlabeled "navigation" (mirrors index.html) -->
                <div>
                    <a href="/" class="nav__logo">Jacob</a>
                </div>
                <div class="nav__menu" id="nav-menu">
                    <ul class="nav__list">
                        <li class="nav__item"><a href="/" class="nav__link">Home</a></li>
                        <li class="nav__item"><a href="/#about" class="nav__link">About</a></li>
                        <li class="nav__item"><a href="/#Projects" class="nav__link">Projects</a></li>
                        <li class="nav__item"><a href="/#skills" class="nav__link">Skills</a></li>
                        <li class="nav__item"><a href="/#contact" class="nav__link">Contact</a></li>
                    </ul>
                </div>
                <div style="display: flex; align-items: center;">
                    <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Switch to light mode" style="position: relative; top: -2px;">
                        <i class='bx bx-sun' id="theme-icon" aria-hidden="true"></i>
                    </button>
                    <script>
                        // Correct the theme toggle's baseline state for returning light-mode users,
                        // before paint and before main.js loads at end of <body>. The button is hardcoded
                        // in its dark-mode state (sun icon + "Switch to light mode"), but the inline <head>
                        // script has already applied the saved light theme — so without this the toggle
                        // briefly shows the wrong icon and, more importantly, announces the wrong action to
                        // assistive tech ("Switch to light mode" while the page is already light). main.js
                        // re-applies the same state later (classList.replace is a no-op when the class is
                        // absent, and the aria-label is identical), so this only removes the flash/mismatch.
                        // Mirrors index.html.
                        try {
                            if (localStorage.getItem('theme') === 'light') {
                                var _ti = document.getElementById('theme-icon');
                                if (_ti) _ti.classList.replace('bx-sun', 'bx-moon');
                                var _tt = document.getElementById('theme-toggle');
                                if (_tt) _tt.setAttribute('aria-label', 'Switch to dark mode');
                            }
                        } catch (e) {}
                    </script>
                    <div class="nav__toggle" id="nav-toggle" role="button" tabindex="0" aria-label="Toggle navigation menu" aria-controls="nav-menu" aria-expanded="false"> <!-- baseline tabindex + collapsed state so the toggle is keyboard-focusable and its state is announced before/independent of main.js (mirrors index.html; main.js's guard prevents double-setting) -->
                        <i class='bx bx-menu' aria-hidden="true"></i>
                    </div>
                </div>
            </nav>
        </header>

        <main class="l-main" id="main-content" tabindex="-1">
            <div class="error-page">
                <div class="error-code">404</div>
                <h1 class="error-message">Page not found</h1>
                <p class="error-description">The page you're looking for doesn't exist or has been moved.</p>
                <a href="/" class="button">Back to Home</a>
            </div>
        </main>

        <!--===== FOOTER =====-->
        <footer class="footer">
            <p class="footer__title">Jacob</p>
            <div class="footer__social">
                <!-- rel="me" marks these as Jacob's own verified identity profiles — the HTML-level identity/authorship signal read by rel-me consumers (IndieAuth, Mastodon verification), which crawl any reachable page of the domain regardless of its noindex status. index.html already carries rel="me" on every link to these two profiles; the 404 footer was the one page site-wide still missing it. Additive rel token — no visual or behaviour change (noopener/noreferrer preserved). -->
                <a href="https://www.linkedin.com/in/jacobhl/" class="footer__icon" target="_blank" rel="me noopener noreferrer" aria-label="LinkedIn profile"><i class='bx bxl-linkedin' aria-hidden="true"></i></a>
                <a href="https://github.com/jacobhl3ca" class="footer__icon" target="_blank" rel="me noopener noreferrer" aria-label="GitHub profile"><i class='bx bxl-github' aria-hidden="true"></i></a>
                <a href="mailto:hi@jacobhl.com" class="footer__icon" aria-label="Send email"><i class='bx bx-envelope' aria-hidden="true"></i></a>
                <a href="/#contact" class="footer__icon" aria-label="Contact"><i class='bx bx-file' aria-hidden="true"></i></a>
            </div>
            <p class="footer__copy">Let's get you back!</p>
        </footer>

        <!--===== MAIN JS (handles theme toggle, nav, etc.) =====-->
        <script src="/assets/js/main.js"></script>

        <!-- GoatCounter analytics -->
        <script data-goatcounter="https://jacobhl.goatcounter.com/count"
                async src="//gc.zgo.at/count.js"></script>
    </body>
</html>
